# Which model to fit and its hyperparameters. Hand-edited.
# Row selection + loss weighting live in dataset_config.yaml.

model: lightgbm       # ridge | lightgbm

ridge:
  alpha: 1.0          # L2 strength; raise to regularize harder

# Gradient-boosted trees. One model is fit per PC (multi-output wrapper), so each
# component gets its own trees — PC0 can be fit hard while the tail stays simple.
lightgbm:
  n_estimators: 800        # tuned: 400 underfit badly (all-skill 27.7%->31.0% at 800)
  learning_rate: 0.05
  num_leaves: 47           # 95 maxed the RANDOM split but overfits FORWARD-IN-TIME; on the
                           # temporal holdout 47 lifts all-skill 16.8->17.7 (see VALIDATION.md).
                           # (random-split peak was ~95; the real task is the forward holdout.)
  min_child_samples: 50    # raise to regularize (min rows per leaf)
  subsample: 0.8
  subsample_freq: 1        # subsample only bites when freq > 0
  colsample_bytree: 0.8
  verbose: -1
