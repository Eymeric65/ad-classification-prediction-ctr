# Which ads to train the score-predictor on, and how to weight per-component error.
# Hand-edited. This config is about ROWS and the LOSS, not about the model
# (model choice + hyperparameters live in pipeline_config.yaml).

# --- row selection ----------------------------------------------------------
rows:
  # Annotation schema to keep: full | light | any.
  # The prediction set is 100% "full", so training on "full" matches it best,
  # at the cost of a smaller N. Switch to "any" to use every ad.
  ann_schema: any

# --- which feature groups to feed the model ---------------------------------
# Column names come from dataset.py (CAT_COLS / AREA_COLS / ANN_FLAG_COLS).
features:
  categorical: true   # CAT_COLS      - industry, goal, format, CTA type, size
  area: true          # AREA_COLS     - 10-dim image-composition vector
  ann_flags: true     # ANN_FLAG_COLS - presence flags + face/text counts
  date: false         # DATE_COLS     - cyclical release-month/day-of-year. Helped the RANDOM
                      #   split but is mildly TIME-LEAKING forward: on the temporal holdout it
                      #   depresses the middle/yda buckets, so it's off. min_date still drives
                      #   recency weighting below (that's a sample weight, not a feature).
  image: true         # IMG_COLS      - per-category mask coverage + centroid (cx,cy)

# --- train/test split -------------------------------------------------------
test_size: 0.2
random_state: 42

# --- per-AD sample weighting (the high-CTR tail lever) ----------------------
# Weights each TRAINING ad in the loss by its actual curve level, so the model
# stops hugging the boring middle and attends to the outliers we actually care
# about. Trades middle accuracy for tail accuracy — that's the point.
#   none      -> uniform (default model behaviour)
#   power     -> w = (level / median_level) ** power     (power>0 favors high CTR)
#   threshold -> ads with mean CTR >= `threshold` get `boost`, rest get 1.0
# `clip` caps the max/min weight ratio so the heavy tail can't produce runaway
# weights. Computed from training targets only (no leakage).
sample_weighting:
  scheme: threshold  # Pareto-best: max tail skill while the typical ad still beats baseline
  power: 0.75
  # threshold=0.0115 is the knee. boost RETUNED 8->6 for the FORWARD-IN-TIME objective: on the
  # temporal holdout boost 8 leaves the everyday ad underwater (mid ~0), boost 6 + recency keeps
  # it comfortably positive (mid ~+7) while the tail stays up (see VALIDATION.md temporal table).
  threshold: 0.0115
  boost: 6.0
  clip: 30
  # Recency time-decay (see pipeline.run.recency_weights): weight ads by how recent they are,
  # anchored on the newest training ad. The real predict set is a forward holdout, so recent
  # ads are the closest analogue; half_life=120 days narrowed the temporal-drift gap the most
  # (all 16.8->17.7, yda 23.1->27.5, middle back above zero) without eroding the tail.
  recency:
    half_life: 120   # days; null / omit to disable

# --- per-component RMSE weighting -------------------------------------------
# PC0 carries ~98.5% of curve variance, so the components are NOT equally
# important. The aggregate score-space RMSE is a weighted average of the
# per-component RMSEs using these weights.
#   equal              -> every PC counts the same
#   explained_variance -> weight by each PC's explained_variance_ratio (favors PC0)
#   manual             -> use the explicit list below
weighting:
  scheme: explained_variance
  manual: [1, 1, 1, 1, 1, 1, 1, 1]
